name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    # Run after arXiv's weekday announcement window in both DST and standard time.
    - cron: '30 2 * * 1-5'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          CUSTOM_CONFIG: ${{ secrets.CUSTOM_CONFIG }}
        run: |
          if [ -z "$CUSTOM_CONFIG" ]; then
            echo "CUSTOM_CONFIG secret is empty or not set."
            exit 1
          fi
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          echo "CUSTOM_CONFIG loaded into config/custom.yaml"
          uv run src/zotero_arxiv_daily/main.py
